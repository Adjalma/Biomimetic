name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compile-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile sources
        run: python -m compileall -q src

  bio-console-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy scikit-learn matplotlib seaborn
          python -m pip install tqdm joblib psutil python-dateutil typing-extensions
      - name: Install PyTorch (CPU) and test deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install fastapi pytest requests "pydantic>=2" python-dotenv
          python -m pip install captum || echo "⚠️ captum installation failed (optional)"
          python -m pip install neat-python || echo "⚠️ neat-python installation failed (optional)"
      - name: Debug installed packages
        run: |
          python -m pip list | grep -E "(torch|fastapi|pytest|requests|pydantic|numpy|pandas|scikit-learn|captum|neat)"
          python -c "import sys; print('Python path:', sys.path)"
      - name: Verify imports
        run: |
          python -c "import torch; print(f'✅ PyTorch {torch.__version__} importado')"
          python -c "import numpy; print(f'✅ NumPy {numpy.__version__} importado')"
          python -c "import sys; sys.path.insert(0, 'src'); import app.bio_console_api; print('✅ Bio Console API importada com sucesso')"
          python -c "import sys; sys.path.insert(0, 'src'); import systems.sistemas.sistema_meta_learning_biomimetico; print('✅ Sistema biomimético importado com sucesso')"
      - name: Bio Console API contract tests
        run: python -m pytest tests/test_bio_console_api_contract.py -v --tb=short
