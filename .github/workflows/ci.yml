name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compile-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile sources
        run: python -m compileall -q src

  bio-console-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy scikit-learn matplotlib seaborn
          python -m pip install tqdm joblib psutil python-dateutil typing-extensions
      - name: Install PyTorch (CPU) and test deps
        run: |
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install fastapi pytest requests "pydantic>=2"
      - name: Bio Console API contract tests
        run: python -m pytest tests/test_bio_console_api_contract.py -q
